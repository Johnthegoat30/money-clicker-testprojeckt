<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Clicker</title>
    <style>
        body {
            background: linear-gradient(to right, #9b59b6, #8e44ad);
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Welcome to Money Clicker!</h1>
    <div>
        <p>Money: <span id="money">0</span></p>
        <button id="clickBtn">Click for Money</button>
        <button id="rebirthBtn">Rebirth / Prestige</button>
    </div>
    <script>
        let money = 0;
        let multiplier = 1;

        document.getElementById('clickBtn').addEventListener('click', function() {
            money += multiplier;
            document.getElementById('money').innerText = money;
        });

        document.getElementById('rebirthBtn').addEventListener('click', function() {
            let bonus = Math.floor(money / 1000); // e.g., 1 multiplier for every 1000 money
            multiplier += bonus;
            money = 0;
            document.getElementById('money').innerText = money;
            alert(`You have rebirthed! Your new multiplier is ${multiplier}.`);
        });
    </script>
</body>
</html>
